services:
  - type: web
    name: tg-moderation-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: BOT_TOKEN
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: ALLOWED_GROUP_IDS
        sync: false
      - key: MODELS
        value: mistral-small-latest,mistral-small-2506,open-mistral-nemo
      - key: WARNING_MESSAGE
        value: "⚠️ Message removed: severe profanity is not allowed here."
      - key: WARNING_TTL
        value: "5"
